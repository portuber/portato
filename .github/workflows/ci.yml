name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  check:
    name: vet + fmt + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: gofmt
        run: |
          out="$(gofmt -l .)"
          if [ -n "$out" ]; then
            echo "::error::gofmt would change:"
            echo "$out"
            exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: go test
        run: go test ./... -race

  lint:
    # Enforces the same .golangci.yml that `make lint` runs locally (phase 33):
    # predeclared (no builtin shadowing) + gocyclo (min 15). CI never ran lint
    # before, so these could slip in if an author skipped the local ritual.
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          # The golangci-lint-action brings its own cache; let setup-go provide
          # only the toolchain (honors the go.mod toolchain directive).
          cache: false
      - uses: golangci/golangci-lint-action@v6
        with:
          # .golangci.yml is a v1-schema config (phase 33); golangci-lint v2
          # uses an incompatible format, so pin to v1.x.
          version: v1.64.8
          # Build golangci-lint from source under the workflow's Go (1.26.5,
          # from go.mod via setup-go). The default `binary` mode downloads a
          # prebuilt v1.64.8 built with Go 1.24, which can't parse the 1.26
          # toolchain (the v1.x release line ships no Go-1.26 binary). Mirrors
          # the `go install` the govulncheck job uses in security.yml.
          install-mode: goinstall

  build-all:
    name: cross-compile (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goos: [darwin, linux, windows]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: build
        run: GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -o bin/portato-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/portato

  windows-smoke:
    # Phase 17: prove the Windows build actually runs there — cross-compiling is
    # necessary but not sufficient (named-pipe IPC + registry autostart need a
    # real Windows host). Mirrors the phase-17 DoD: daemon + list round-trip
    # over the named pipe, and install/uninstall of the HKCU Run key.
    name: windows smoke (named-pipe round-trip + autostart)
    runs-on: windows-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: build
        run: go build -o portato.exe ./cmd/portato
      - name: daemon + list round-trip over the named pipe
        shell: pwsh
        run: |
          $exe = ".\portato.exe"
          $p = Start-Process -FilePath $exe -ArgumentList "daemon" -PassThru -WindowStyle Hidden -RedirectStandardError daemon.err
          $ok = $false
          $last = ""
          foreach ($i in 1..50) {
            $last = & $exe list 2>&1 | Out-String
            if ($LASTEXITCODE -eq 0) { $ok = $true; break }
            Start-Sleep -Milliseconds 200
          }
          if (-not $ok) {
            Write-Host "portato list output:`n$last"
            if (Test-Path daemon.err) { Write-Host "daemon stderr:`n$(Get-Content daemon.err -Raw)" }
            throw "portato list did not succeed within ~10s (daemon never answered on the named pipe)"
          }
          Write-Host "daemon reachable over the named pipe; list output:`n$last"
          Stop-Process -Id $p.Id -Force
      - name: autostart install / uninstall (HKCU Run key)
        shell: pwsh
        run: |
          $exe = ".\portato.exe"
          & $exe install
          if ($LASTEXITCODE -ne 0) { throw "portato install failed" }
          $run = "HKCU:\Software\Microsoft\Windows\CurrentVersion\Run"
          $v = (Get-ItemProperty -Path $run -Name Portato -ErrorAction SilentlyContinue).Portato
          if (-not $v) { throw "HKCU Run value 'Portato' missing after install" }
          Write-Host "installed Run value: $v"
          & $exe uninstall
          if ($LASTEXITCODE -ne 0) { throw "portato uninstall failed" }
          $gone = (Get-ItemProperty -Path $run -Name Portato -ErrorAction SilentlyContinue).Portato
          if ($gone) { throw "HKCU Run value 'Portato' still present after uninstall" }
          Write-Host "Run value removed after uninstall"
