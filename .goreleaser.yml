version: 2

project_name: portato

builds:
  - id: portato
    main: ./cmd/portato
    binary: portato
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      # -s -w strip debug info for a smaller binary; inject the version, commit
      # and date from the git tag into internal/cmd.{version,commit,date}.
      - -s -w
      - -X github.com/portuber/portato/internal/cmd.version={{.Version}}
      - -X github.com/portuber/portato/internal/cmd.commit={{.Commit}}
      - -X github.com/portuber/portato/internal/cmd.date={{.Date}}

archives:
  - id: default
    formats: [tar.gz]
    # Human-friendly archive name (macOS, x86_64) matching `make build-all`.
    # Windows is not built yet (see phase 17); Scoop is deferred with it.
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- if eq .Os "darwin"}}macOS{{- else}}{{ .Os }}{{- end}}_
      {{- if eq .Arch "amd64"}}x86_64{{- else}}{{ .Arch }}{{- end}}

checksum:
  name_template: checksums.txt

# On a `git tag vX.Y.Z` push, goreleaser publishes the GitHub Release (the
# owner/repo is inferred from the origin remote) and the tap/bucket commits
# below. `make snapshot` (goreleaser --snapshot) skips all publishing.
release:
  draft: false

homebrew_casks:
  # Homebrew Cask -> https://github.com/portuber/homebrew-tap (Casks/portato.rb)
  # `brew install --cask portuber/tap/portato`
  # goreleaser v2.16 deprecated `brews` (formulae) for pre-built binaries in
  # favour of casks; casks are macOS-only (Linux users use deb/rpm/tarball).
  - name: portato
    binaries:
      - portato
    repository:
      owner: portuber
      name: homebrew-tap
      branch: main
      # A PAT with push rights to the tap repo (cross-repo publish); the default
      # GITHUB_TOKEN cannot push to portuber/homebrew-tap.
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/portuber/portato
    description: SSH port-forwarding manager with a TUI
    license: MIT
    commit_author:
      name: Valerii Kipkaev
      email: kipkaev@kipkaev.name
    # The binary is not Apple-signed/notarized; strip the quarantine bit on
    # install so Gatekeeper does not block it.
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/portato"]
          end

nfpms:
  # deb + rpm from one config (linux builds only).
  - package_name: portato
    file_name_template: "{{ .PackageName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    homepage: https://github.com/portuber/portato
    description: SSH port-forwarding manager with a TUI
    maintainer: Valerii Kipkaev <kipkaev@kipkaev.name>
    license: MIT
    vendor: Valerii Kipkaev
    formats:
      - deb
      - rpm
    contents:
      - src: ./LICENSE
        dst: /usr/share/doc/portato/LICENSE

changelog:
  use: git
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^Merge"

snapshot:
  version_template: "{{ .Tag }}-next"
