version: 2

project_name: portato

# Regenerate the bundled THIRD_PARTY_LICENSES.txt (Phase 32) before the pipeline
# assembles archives/nfpm packages, so every binary release carries each
# dependency's LICENSE (MIT/Apache-2.0/BSD-3) as required on redistribution.
# The make target installs go-licenses and concatenates the per-module notices
# into one file (a tree would collide on identical LICENSE basenames inside
# deb/rpm, which flatten directory sources).
before:
  hooks:
    - make third-party-licenses

builds:
  - id: portato
    main: ./cmd/portato
    binary: portato
    env:
      - CGO_ENABLED=0
    # -trimpath strips the build machine's absolute source paths (e.g.
    # /Users/.../glm-complex) from the binary, so release artifacts only expose
    # the module path (github.com/portuber/portato/...), not the maintainer's
    # local working directory. It is a build flag, not an ldflag.
    flags:
      - -trimpath
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      # -s -w strip debug info for a smaller binary; inject the version, commit
      # and date from the git tag into internal/cmd.{version,commit,date}.
      - -s -w
      - -X github.com/portuber/portato/internal/cmd.version={{.Version}}
      - -X github.com/portuber/portato/internal/cmd.commit={{.Commit}}
      - -X github.com/portuber/portato/internal/cmd.date={{.Date}}

archives:
  - id: default
    formats: [tar.gz]
    # Windows ships a zip instead of a tar.gz (Phase 17).
    format_overrides:
      - goos: windows
        formats: [zip]
    # Human-friendly archive name (macOS, Windows, x86_64) matching
    # `make build-all`.
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- if eq .Os "darwin"}}macOS{{- else if eq .Os "windows"}}Windows{{- else}}{{ .Os }}{{- end}}_
      {{- if eq .Arch "amd64"}}x86_64{{- else}}{{ .Arch }}{{- end}}
    # Pack the dependency license notices (Phase 32) alongside the project's
    # own LICENSE and README. Setting `files` overrides goreleaser's defaults,
    # so the defaults we rely on are re-listed here.
    files:
      - LICENSE
      - README.md
      - THIRD_PARTY_LICENSES.txt

checksum:
  name_template: checksums.txt

# On a `git tag vX.Y.Z` push, goreleaser publishes the GitHub Release (the
# owner/repo is inferred from the origin remote) and the tap/bucket commits
# below. `make snapshot` (goreleaser --snapshot) skips all publishing.
release:
  draft: false

homebrew_casks:
  # Homebrew Cask -> https://github.com/portuber/homebrew-tap (Casks/portato.rb)
  # `brew install --cask portuber/tap/portato`
  # goreleaser v2.16 deprecated `brews` (formulae) for pre-built binaries in
  # favour of casks; casks are macOS-only (Linux users use deb/rpm/tarball).
  - name: portato
    binaries:
      - portato
    repository:
      owner: portuber
      name: homebrew-tap
      branch: main
      # A PAT with push rights to the tap repo (cross-repo publish); the default
      # GITHUB_TOKEN cannot push to portuber/homebrew-tap.
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/portuber/portato
    description: SSH port-forwarding manager with a TUI
    license: MIT
    commit_author:
      name: Valerii Kipkaev
      email: kipkaev@kipkaev.name
    # The binary is not Apple-signed/notarized; strip the quarantine bit on
    # install so Gatekeeper does not block it.
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/portato"]
          end

scoops:
  # Scoop manifest -> https://github.com/portuber/scoop-bucket (bucket/portato.json)
  # `scoop bucket add portuber https://github.com/portuber/scoop-bucket`
  # `scoop install portato/portato`
  # Windows-only (Scoop is a Windows installer); published alongside the
  # windows zip archive on release (Phase 17).
  - name: portato
    homepage: https://github.com/portuber/portato
    description: SSH port-forwarding manager with a TUI
    license: MIT
    repository:
      owner: portuber
      name: scoop-bucket
      branch: main
      # Reuse the same cross-repo PAT as Homebrew (a repo-scoped token pushes to
      # any portuber/* repo the owner can access); the default GITHUB_TOKEN
      # cannot push to portuber/scoop-bucket. (Was .Env.SCOOP_BUCKET_GITHUB_TOKEN,
      # which the release workflow never injected — that broke the v0.3.0 release
      # at the Scoop step.)
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    commit_author:
      name: Valerii Kipkaev
      email: kipkaev@kipkaev.name

nfpms:
  # deb + rpm from one config (linux builds only).
  - package_name: portato
    file_name_template: "{{ .PackageName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    homepage: https://github.com/portuber/portato
    description: SSH port-forwarding manager with a TUI
    maintainer: Valerii Kipkaev <kipkaev@kipkaev.name>
    license: MIT
    vendor: Valerii Kipkaev
    formats:
      - deb
      - rpm
    contents:
      - src: ./LICENSE
        dst: /usr/share/doc/portato/LICENSE
      # Dependency license notices (Phase 32) — a single concatenated file
      # alongside the project's own LICENSE.
      - src: THIRD_PARTY_LICENSES.txt
        dst: /usr/share/doc/portato/THIRD_PARTY_LICENSES.txt

changelog:
  use: git
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^Merge"

snapshot:
  version_template: "{{ .Tag }}-next"
