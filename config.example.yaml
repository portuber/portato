# Portato configuration. See docs/SPEC.md for the full reference.
#
# Default location (override with `portato --config <path>`):
#   macOS: ~/Library/Application Support/portato/config.yaml
#   Linux: ~/.config/portato/config.yaml

defaults:
  identity: ~/.ssh/id_ed25519     # optional; empty -> ssh-agent
  known_hosts: ~/.ssh/known_hosts
  accept_new_hosts: false         # TOFU: when true, new hosts are appended to known_hosts

tubers:
  - name: db-stage                # unique, required
    type: local                   # "local" (-L), "remote" (-R), or "dynamic" (-D)
    local: 5432                   # port or host:port (defaults to 127.0.0.1)
    remote: 10.0.0.5:5432         # destination address, relative to the ssh server
    ssh: user@bastion.example.com:22   # required; user and port optional
    identity: ~/.ssh/id_ed25519   # optional; overrides defaults
    enabled: false                # off by default; the daemon persists toggles here

  # Remote (-R): listen on the ssh server, forward back to this machine.
  # `remote` is listened on the server. A bare port (or ":port") binds all
  # interfaces ("*:port", the default — needs `GatewayPorts yes|clientspecified`
  # in sshd_config); for loopback-only use an explicit host like
  # `127.0.0.1:16379`. `local` is where connections are forwarded here.
  - name: pull-redis
    type: remote
    remote: 16379                # listened on the server -> *:16379 (all interfaces)
    local: 6379                  # forwarded to the local redis
    ssh: user@bastion.example.com:22
    enabled: false

  # Dynamic (-D): a SOCKS5 proxy on `local`. Each connection's destination is
  # taken from the SOCKS request and dialed on the ssh server side, so there is
  # no `remote`. Point a browser or `curl --socks5 127.0.0.1:1080` at it to
  # reach internal hosts through the bastion.
  - name: socks
    type: dynamic
    local: 1080                 # SOCKS5 listen address -> 127.0.0.1:1080
    ssh: user@bastion.example.com:22
    enabled: false
